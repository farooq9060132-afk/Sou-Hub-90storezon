name: Build for Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install pnpm
      run: npm install -g pnpm@9

    - name: Install Dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build Application
      env:
        PORT: 3000
        BASE_PATH: "/"
        NODE_ENV: production
      run: pnpm -r --if-present run build

    - name: Create .htaccess for Hostinger
      run: |
        echo "<IfModule mod_rewrite.c>" > ./artifacts/90storzon/dist/public/.htaccess
        echo "  RewriteEngine On" >> ./artifacts/90storzon/dist/public/.htaccess
        echo "  RewriteBase /" >> ./artifacts/90storzon/dist/public/.htaccess
        echo "  RewriteRule ^index\.html$ - [L]" >> ./artifacts/90storzon/dist/public/.htaccess
        echo "  RewriteCond %{REQUEST_FILENAME} !-f" >> ./artifacts/90storzon/dist/public/.htaccess
        echo "  RewriteCond %{REQUEST_FILENAME} !-d" >> ./artifacts/90storzon/dist/public/.htaccess
        echo "  RewriteRule . /index.html [L]" >> ./artifacts/90storzon/dist/public/.htaccess
        echo "</IfModule>" >> ./artifacts/90storzon/dist/public/.htaccess

    - name: Upload Hostinger Files
      uses: actions/upload-artifact@v4
      with:
        name: Hostinger-Ready-Files
        path: ./artifacts/90storzon/dist/public
